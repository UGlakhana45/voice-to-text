apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'

android {
    namespace 'com.voiceflow.nativecore'
    compileSdkVersion 34
    ndkVersion "25.1.8937393"

    defaultConfig {
        minSdkVersion 23
        targetSdkVersion 34
    }

    /**
     * Two flavors mirroring the host app:
     *   - `cloud` : no JNI, no whisper.cpp, no llama.cpp. Only the Audio
     *               capture module is compiled. Drops ~30–50 MB per ABI.
     *   - `full`  : full whisper.cpp + llama.cpp JNI build.
     */
    flavorDimensions "edition"
    productFlavors {
        cloud {
            dimension "edition"
        }
        full {
            dimension "edition"
            externalNativeBuild {
                cmake {
                    cppFlags "-std=c++17 -O3 -fexceptions -frtti"
                    arguments "-DANDROID_STL=c++_shared",
                              "-DGGML_OPENMP=OFF",
                              "-DWHISPER_BUILD_TESTS=OFF",
                              "-DWHISPER_BUILD_EXAMPLES=OFF",
                              "-DLLAMA_BUILD_TESTS=OFF",
                              "-DLLAMA_BUILD_EXAMPLES=OFF"
                    abiFilters "arm64-v8a", "x86_64"
                }
            }
        }
    }

    // Only the `full` variant has cmake config above, so AGP skips native
    // compilation entirely for `cloud` builds.
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
}

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
}
